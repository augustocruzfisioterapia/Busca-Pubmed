<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 84" role="img" aria-labelledby="title desc">
  <title id="title">Tem Evidência?</title>
  <desc id="desc">Logo principal da marca Tem Evidência? com capelo acadêmico e interrogação.</desc>
  <rect x="10" y="10" width="64" height="64" rx="16" fill="#dcefc5" stroke="#fffdf7" stroke-width="1.4"/>
  <path d="M20 32 42 20.5 64 32 42 43.5z" fill="#0d3f35" stroke="#fffdf7" stroke-opacity=".42" stroke-width="1.35" stroke-linejoin="round"/>
  <path d="M29 38.6v8c0 4.5 26 4.5 26 0v-8" fill="none" stroke="#0d3f35" stroke-width="2.3" stroke-linecap="round"/>
  <path d="M64 32v13m0 0-3 5.2m3-5.2 3 5.2" fill="none" stroke="#d8b96f" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M27 58h8.5l5.8-8.2 5.6 8.2H56" fill="none" stroke="#17745f" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
