services:
  - type: web
    name: busca-pubmed
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: NCBI_TOOL
        value: BuscaPubMed
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 20
      - key: MAX_BODY_SIZE
        value: 1000000
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_MS
        value: 45000
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: 4200
      - key: OPENAI_ESTIMATED_CALL_COST_USD
        value: 0.01
      - key: AI_CACHE_TTL_MS
        value: 604800000
      - key: RATE_LIMIT_SEARCH_MAX
        value: 20
      - key: RATE_LIMIT_AI_WINDOW_MS
        value: 600000
      - key: RATE_LIMIT_AI_MAX
        value: 6
      - key: ALLOWED_ORIGIN
        value: https://www.temevidencia.com.br,https://temevidencia.com.br,https://busca-pubmed.onrender.com,https://augustocruzfisioterapia.github.io
      - key: GA_MEASUREMENT_ID
        value: G-N0QQY69DTE
      - key: GA_API_SECRET
        sync: false
      - key: ADMIN_METRICS_TOKEN
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: UNPAYWALL_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
